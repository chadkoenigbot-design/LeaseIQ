<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeaseIQ — Intelligent Lease Management</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f6f3ef;
      --panel: #ffffff;
      --panel2: #f1ebe4;
      --text: #2a231d;
      --muted: #7d6f63;
      --accent: #c4a882;
      --accent-dark: #7d6047;
      --green: #3f8f5d;
      --yellow: #c9971a;
      --red: #c35b4b;
      --blue: #437ca8;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 16px;
      --sidebar: 230px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar);
      background: #1f1b18;
      color: white;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }
    .brand { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .brand h1 { margin: 0; font-size: 1.4rem; }
    .brand span { color: var(--accent); }
    .brand p { margin: 6px 0 0; font-size: .72rem; color: rgba(255,255,255,.5); letter-spacing: .08em; }
    .nav { padding: 18px 0; }
    .nav button {
      width: 100%; background: transparent; border: 0; color: rgba(255,255,255,.65);
      text-align: left; padding: 12px 20px; font-size: .95rem; cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav button.active, .nav button:hover {
      color: white; background: rgba(196,168,130,.12); border-left-color: var(--accent);
    }
    .sidebar .cta { margin: auto 20px 0; padding: 10px 14px; border-radius: 10px; border: 0; background: var(--accent); color: #1f1b18; font-weight: 700; cursor: pointer; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      padding: 18px 24px; background: white; border-bottom: 1px solid #e7ddd3;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .topbar h2 { margin: 0; font-size: 1.15rem; }
    .content { padding: 24px; overflow: auto; }
    .grid { display: grid; gap: 16px; }
    .grid.stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.two { grid-template-columns: 1.2fr .8fr; }
    .grid.cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card, .stat {
      background: var(--panel); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 18px;
    }
    .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .stat .value { font-size: 1.8rem; font-weight: 800; }
    .stat .sub { color: var(--muted); font-size: .84rem; margin-top: 4px; }
    .alert {
      background: #fff7df; color: #7b5b00; border: 1px solid #edd28a; padding: 12px 14px;
      border-radius: 12px; margin-bottom: 18px; font-size: .92rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #eee4da; text-align: left; }
    th { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: .74rem; font-weight: 700; }
    .active { background: #dff3e6; color: var(--green); }
    .expiring { background: #fff1cf; color: var(--yellow); }
    .negotiating { background: #deecf7; color: var(--blue); }
    .btn {
      border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 700;
    }
    .btn.primary { background: var(--accent); color: #1f1b18; }
    .btn.ghost { background: var(--panel2); color: var(--accent-dark); }
    .compare-box { border-left: 4px solid var(--green); }
    .chat { display: flex; flex-direction: column; gap: 12px; }
    .bubble {
      max-width: 75%; padding: 12px 14px; border-radius: 14px; line-height: 1.45;
      box-shadow: var(--shadow);
    }
    .ai { background: white; }
    .user { background: #1f1b18; color: white; margin-left: auto; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .pill { background: var(--panel2); border: 0; border-radius: 999px; padding: 8px 12px; cursor: pointer; }
    .empty { color: var(--muted); text-align: center; padding: 36px 10px; }
    canvas { max-width: 100%; }
    @media (max-width: 960px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; }
      .grid.stats, .grid.two, .grid.cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h1>Lease<span>IQ</span></h1>
      <p>INTELLIGENT LEASE MANAGEMENT</p>
    </div>
    <div class="nav" id="nav"></div>
    <button class="cta" onclick="addLease()">+ Add Lease</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 id="pageTitle">Portfolio</h2>
      <div>
        <button class="btn ghost" onclick="resetDemo()">Reset Demo Data</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>

  <script>
    const NAV_ITEMS = [
      { key: 'portfolio', label: '🏢 Portfolio' },
      { key: 'reports', label: '📊 Reports' },
      { key: 'compare', label: '⚖️ Compare' },
      { key: 'ai', label: '🤖 AI Assistant' }
    ];

    const SAMPLE_LEASES = [
      { id:'l1', name:'1818 Olive Street', city:'St. Louis', sqft:2200, rate:22, type:'NNN', status:'active', expires:'2029-02-28', landlord:'Cortex STL Properties', note:'Strong location with predictable operating expenses.' },
      { id:'l2', name:'7733 Forsyth Blvd', city:'Clayton', sqft:1800, rate:28, type:'Gross', status:'expiring', expires:'2026-02-28', landlord:'Clayton Office Partners', note:'Should begin renewal conversations soon.' },
      { id:'l3', name:'3200 Maplewood Ave', city:'Maplewood', sqft:2000, rate:18, type:'Modified Gross', status:'negotiating', expires:'2028-05-31', landlord:'Maplewood Creative LLC', note:'Best value in portfolio and strong expansion candidate.' }
    ];

    let leases = JSON.parse(localStorage.getItem('leaseiq_demo_data') || 'null') || [...SAMPLE_LEASES];
    let currentPage = 'portfolio';
    let chartRef;

    function persist() {
      localStorage.setItem('leaseiq_demo_data', JSON.stringify(leases));
    }

    function resetDemo() {
      leases = [...SAMPLE_LEASES];
      persist();
      render();
    }

    function addLease() {
      const name = prompt('Property name?');
      if (!name) return;
      leases.push({
        id: 'l' + Date.now(),
        name,
        city: prompt('City?', 'St. Louis') || 'St. Louis',
        sqft: Number(prompt('Square feet?', '1500') || 1500),
        rate: Number(prompt('Base rent ($/sf/yr)?', '24') || 24),
        type: prompt('Lease type?', 'NNN') || 'NNN',
        status: 'active',
        expires: prompt('Expiration date?', '2028-12-31') || '2028-12-31',
        landlord: prompt('Landlord?', 'Unknown') || 'Unknown',
        note: prompt('Quick note?', 'Added from demo UI') || 'Added from demo UI'
      });
      persist();
      currentPage = 'portfolio';
      render();
    }

    function nav(page) {
      currentPage = page;
      render();
    }

    function currency(n) { return '$' + n.toLocaleString(); }
    function annualCost(l) { return Math.round(l.sqft * l.rate); }
    function totalAnnualCost() { return leases.reduce((sum, l) => sum + annualCost(l), 0); }
    function expiringSoon() { return leases.filter(l => l.status === 'expiring').length; }
    function avgRate() { return (leases.reduce((s, l) => s + l.rate, 0) / leases.length).toFixed(1); }

    function renderNav() {
      const navEl = document.getElementById('nav');
      navEl.innerHTML = NAV_ITEMS.map(item =>
        `<button class="${item.key === currentPage ? 'active' : ''}" onclick="nav('${item.key}')">${item.label}</button>`
      ).join('');
    }

    function renderPortfolio() {
      return `
        <div class="alert">1 lease is approaching expiration. Review 7733 Forsyth Blvd for renewal timing.</div>
        <div class="grid stats">
          <div class="stat"><div class="label">Leases</div><div class="value">${leases.length}</div><div class="sub">Tracked locations</div></div>
          <div class="stat"><div class="label">Total Annual Rent</div><div class="value">${currency(totalAnnualCost())}</div><div class="sub">Across all spaces</div></div>
          <div class="stat"><div class="label">Average Rate</div><div class="value">$${avgRate()}</div><div class="sub">Per sf / year</div></div>
          <div class="stat"><div class="label">Expiring Soon</div><div class="value">${expiringSoon()}</div><div class="sub">Needs attention</div></div>
        </div>
        <div style="height:16px"></div>
        <div class="card">
          <div class="label">Portfolio Overview</div>
          <table>
            <thead>
              <tr><th>Property</th><th>City</th><th>Sq Ft</th><th>Rate</th><th>Type</th><th>Status</th><th>Expires</th></tr>
            </thead>
            <tbody>
              ${leases.map(l => `
                <tr>
                  <td><strong>${l.name}</strong><br><span style="color:var(--muted);font-size:.84rem">${l.landlord}</span></td>
                  <td>${l.city}</td>
                  <td>${l.sqft.toLocaleString()}</td>
                  <td>$${l.rate}/sf</td>
                  <td>${l.type}</td>
                  <td><span class="badge ${l.status}">${l.status}</span></td>
                  <td>${l.expires}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div style="height:16px"></div>
        <div class="grid cards">
          ${leases.map(l => `
            <div class="card">
              <div class="label">${l.name}</div>
              <div style="font-size:1.15rem;font-weight:800">${currency(annualCost(l))}/yr</div>
              <div style="margin-top:8px;color:var(--muted)">${l.note}</div>
            </div>`).join('')}
        </div>
      `;
    }

    function renderReports() {
      return `
        <div class="grid two">
          <div class="card">
            <div class="label">Annual Cost by Property</div>
            <canvas id="reportChart" height="150"></canvas>
          </div>
          <div class="card">
            <div class="label">Key Findings</div>
            <ul style="padding-left:18px;line-height:1.7">
              <li>3200 Maplewood Ave is the lowest-cost option per square foot.</li>
              <li>7733 Forsyth Blvd carries the highest annual rate and is expiring soon.</li>
              <li>Portfolio annual rent is ${currency(totalAnnualCost())} based on current sample data.</li>
              <li>Consider renewal negotiation timing for expiring locations.</li>
            </ul>
          </div>
        </div>
      `;
    }

    function renderCompare() {
      const sorted = [...leases].sort((a,b) => annualCost(a) - annualCost(b));
      return `
        <div class="grid cards">
          ${sorted.map((l, i) => `
            <div class="card compare-box">
              <div class="label">${i === 0 ? 'Best value' : 'Comparison'}</div>
              <div style="font-size:1.2rem;font-weight:800">${l.name}</div>
              <div style="margin-top:8px">${l.sqft.toLocaleString()} sf · $${l.rate}/sf · ${l.type}</div>
              <div style="margin-top:8px;color:var(--muted)">Annual Cost: ${currency(annualCost(l))}</div>
              <div style="margin-top:8px"><span class="badge ${l.status}">${l.status}</span></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAI() {
      return `
        <div class="card">
          <div class="label">AI Assistant</div>
          <div class="chat">
            <div class="bubble ai">Your portfolio currently includes ${leases.length} leases. The highest-rate lease is 7733 Forsyth Blvd, and the best value is 3200 Maplewood Ave.</div>
            <div class="bubble user">Which lease should I renegotiate first?</div>
            <div class="bubble ai">Start with 7733 Forsyth Blvd. It has the highest rate and is the nearest expiration risk in the sample portfolio.</div>
          </div>
          <div class="suggestions">
            <button class="pill" onclick="alert('Demo answer: 7733 Forsyth Blvd is the most urgent renewal candidate.')">Which lease is riskiest?</button>
            <button class="pill" onclick="alert('Demo answer: 3200 Maplewood Ave has the lowest annual cost in the sample set.')">Show cheapest lease</button>
            <button class="pill" onclick="alert('Demo answer: Total annual rent is ' + '${currency(totalAnnualCost())}'.replace(/\$\{currency\(totalAnnualCost\(\)\)\}/, ''))">Summarize costs</button>
          </div>
        </div>
      `;
    }

    function render() {
      renderNav();
      document.getElementById('pageTitle').textContent = {
        portfolio: 'Portfolio',
        reports: 'Reports',
        compare: 'Lease Comparator',
        ai: 'AI Assistant'
      }[currentPage];

      const content = document.getElementById('content');
      if (currentPage === 'portfolio') content.innerHTML = renderPortfolio();
      if (currentPage === 'reports') content.innerHTML = renderReports();
      if (currentPage === 'compare') content.innerHTML = renderCompare();
      if (currentPage === 'ai') content.innerHTML = renderAI();

      if (currentPage === 'reports') {
        const ctx = document.getElementById('reportChart');
        if (chartRef) chartRef.destroy();
        chartRef = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: leases.map(l => l.name),
            datasets: [{
              label: 'Annual Cost',
              data: leases.map(l => annualCost(l)),
              backgroundColor: ['#c4a882','#7d6047','#437ca8']
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
          }
        });
      }
    }

    render();
  </script>
</body>
</html>
